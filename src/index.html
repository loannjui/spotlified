<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0"
    />
    <title>Spotlified</title>

    <link rel="manifest" href="manifest.webmanifest" />

    <!-- Stylesheet principale -->
    <link rel="stylesheet" href="https://use.typekit.net/ejq1tva.css" />
    <link rel="stylesheet" href="css/style.css" />

    <!-- Javascript principal -->
    <!-- ...à quoi sert le defer ? :) -->
    <script src="js/index.js" type="module" defer></script>

    <link rel="manifest" href="/manifest.webmanifest" />

    <script
      src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js"
      defer
    ></script>

    <script>
      window.OneSignalDeferred = window.OneSignalDeferred || [];
      OneSignalDeferred.push(async function (OneSignal) {
        await OneSignal.init({
          appId: "3c394d3b-cef7-4ac0-a3b8-a303f861c3cd",
        });
      });
    </script>
  </head>
  <body>
    <header>
      <a href="index.html" id="brand"><img src="img/logo_spotlified.svg" /></a>
      <div id="search-bar">
        <input
          class="search"
          type="search"
          spellcheck="false"
          autocapitalize="false"
          autofocus
          placeholder="Rechercher"
        />
        <i class="fa-solid fa-magnifying-glass"></i>
      </div>
      <a class="sml-btn" href="#search">
        <i class="fa-solid fa-magnifying-glass"></i>
      </a>
    </header>
    <audio id="player" controls autoplay></audio>
    <main>
      <section id="welcome-section" class="centered">
        <h1>Bienvenue sur Spotlified</h1>
        <a class="btn-solid" href="favoris.html">Vers les favoris</a>
        <a class="btn-solid" href="artistes.html">Vers les artistes</a>
      </section>
    </main>
    <bottom-nav> </bottom-nav>
  </body>
</html>
